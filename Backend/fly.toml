app = "self-checkout-9a4fzg"
primary_region = "fra"

[env]
NODE_ENV = "production"
PORT = "3000"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 3_000
min_machines_running = 0
processes = [ "app" ]

  [[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 512